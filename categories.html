<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Select Category</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Select Category</h1>
    <button class="back-btn" onclick="goBack()">⬅ Back</button>

    <div class="category-container">
        <div class="category-card" onclick="selectCategory('Burger')">🍔 Burger</div>
        <div class="category-card" onclick="selectCategory('Cold Drinks')">🥤 Cold Drinks</div>
        <div class="category-card" onclick="selectCategory('Pasta')">🍝 Pasta</div>
        <div class="category-card" onclick="selectCategory('Noodles')">🍜 Noodles</div>
    </div>

    <script>
        function goBack() {
            window.history.back();
        }

        function selectCategory(category) {
            localStorage.setItem("selectedCategory", category);
            window.location.href = "order.html";
        }
    </script>

</body>
</html>
